name: 塔吉多登录

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '发验证码、验证码登录或账密登录'
        required: true
        type: choice
        options:
          - password
          - send-code
          - login
        default: 'password'
      account_id:
        description: '登录时使用的账号标识'
        required: false
        default: 'main'
      account_name:
        description: '登录时显示的账号名称'
        required: false
        default: '主账号'
      phone:
        description: '手机号'
        required: true
      captcha:
        description: '短信验证码'
        required: false
      password:
        description: '账号密码，仅 password 模式需要；推荐改用 TAYGEDO_LOGIN_PASSWORD Secret'
        required: false

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 发送验证码
        if: inputs.mode == 'send-code'
        env:
          TAYGEDO_LOGIN_MODE: send-code
          TAYGEDO_LOGIN_PHONE: ${{ inputs.phone }}
          TAYGEDO_LOGIN_DEVICE_ID_PATH: device-id.txt
        run: pnpm tsx src/login-action.ts

      - name: 保存登录 deviceId
        if: inputs.mode == 'send-code' && hashFiles('device-id.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_SECRET_UPDATE_TOKEN }}
        run: gh secret set TAYGEDO_LOGIN_DEVICE_ID < device-id.txt

      - name: 登录并写回账号
        if: inputs.mode == 'login' || inputs.mode == 'password'
        env:
          TAYGEDO_LOGIN_MODE: ${{ inputs.mode }}
          TAYGEDO_LOGIN_PHONE: ${{ inputs.phone }}
          TAYGEDO_LOGIN_CAPTCHA: ${{ inputs.captcha }}
          TAYGEDO_LOGIN_PASSWORD: ${{ secrets.TAYGEDO_LOGIN_PASSWORD || inputs.password }}
          TAYGEDO_LOGIN_DEVICE_ID: ${{ secrets.TAYGEDO_LOGIN_DEVICE_ID }}
          TAYGEDO_LOGIN_ACCOUNT_ID: ${{ inputs.account_id }}
          TAYGEDO_LOGIN_ACCOUNT_NAME: ${{ inputs.account_name }}
          TAYGEDO_CREDENTIAL_KEY: ${{ secrets.TAYGEDO_CREDENTIAL_KEY }}
          TAYGEDO_CREDENTIAL_KEY_PATH: credential-key.txt
          TAYGEDO_ACCOUNTS: ${{ secrets.TAYGEDO_ACCOUNTS }}
          TAYGEDO_UPDATED_ACCOUNTS_PATH: updated-accounts.json
        run: pnpm tsx src/login-action.ts

      - name: 保存加密密钥 Secret
        if: inputs.mode == 'password' && hashFiles('credential-key.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_SECRET_UPDATE_TOKEN }}
        run: gh secret set TAYGEDO_CREDENTIAL_KEY < credential-key.txt

      - name: 更新账号 Secret
        if: (inputs.mode == 'login' || inputs.mode == 'password') && hashFiles('updated-accounts.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_SECRET_UPDATE_TOKEN }}
        run: gh secret set TAYGEDO_ACCOUNTS < updated-accounts.json
